<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Conductores</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <h1>Conductores</h1>
    <a href="dashboard.html">← Volver al Dashboard</a>
    
    <div class="acciones-principales">
        <button class="btn-primary" onclick="abrirModalCrear()">+ Agregar Conductor</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Licencia</th>
                <th>Acciones</th> </tr>
        </thead>
        <tbody id="listaConductores">
            </tbody>
    </table>

    <div id="modalEditar" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3>Editar Conductor</h3>
            <input type="hidden" id="edit-id">
            
            <label>Nombre:</label>
            <input type="text" id="edit-nombre" class="form-control">
            
            <label>Licencia:</label>
            <input type="text" id="edit-licencia" class="form-control">
            
            <div class="modal-actions">
                <button class="btn-icon" onclick="guardarCambiosConductor()">Guardar</button>
                <button class="btn-secondary" onclick="cerrarModalEditar()">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modalCrear" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3>Registrar Nuevo Conductor</h3>
            
            <label>Nombre:</label>
            <input type="text" id="crear-nombre" class="form-control">
            
            <label>Cédula:</label>
            <input type="text" id="crear-cedula" class="form-control">
            
            <label>Licencia:</label>
            <input type="text" id="crear-licencia" class="form-control">
            
            <label>Teléfono:</label>
            <input type="text" id="crear-telefono" class="form-control">
            
            <div class="modal-actions">
                <button class="btn-icon" onclick="guardarNuevoConductor()">Guardar</button>
                <button class="btn-secondary" onclick="cerrarModalCrear()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/conductores.js"></script>
</body>
</html>
