<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Vehículos</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <h1>Vehículos</h1>
    <a href="dashboard.html">← Volver al Dashboard</a>
    
    <div class="acciones-principales">
        <button class="btn-primary" onclick="abrirModalCrear()">+ Agregar Vehículo</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Placa</th>
                <th>Marca</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="listaVehiculos">
            </tbody>
    </table>

    <div id="modalEditar" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3>Editar Vehículo</h3>
            <input type="hidden" id="edit-id">
            
            <label>Placa:</label>
            <input type="text" id="edit-placa" class="form-control">
            
            <label>Marca:</label>
            <input type="text" id="edit-marca" class="form-control">
            
<label>Estado:</label>
<select id="edit-estado" class="form-control">
    <option value="disponible">Disponible</option>
    <option value="mantenimiento">Mantenimiento</option>
</select>
            
            <div class="modal-actions">
                <button class="btn-icon" onclick="guardarCambiosVehiculo()">Guardar</button>
                <button class="btn-secondary" onclick="cerrarModalEditar()">Cancelar</button>
            </div>
        </div>
    </div>

<div id="modalCrear" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <h3>Registrar Nuevo Vehículo</h3>
        
        <label>Placa:</label>
        <input type="text" id="crear-placa" class="form-control">
        
        <label>Marca:</label>
        <input type="text" id="crear-marca" class="form-control">
        
        <label>Tipo:</label>
        <input type="text" id="crear-tipo" class="form-control">
        
        <label>Capacidad (kg):</label>
        <input type="number" id="crear-capacidad" class="form-control">
        
        <label>Modelo:</label>
        <input type="text" id="crear-modelo" class="form-control">
        
        <label>Año:</label>
        <input type="number" id="crear-anlo" class="form-control">
        
        <div class="modal-actions">
            <button class="btn-icon" onclick="guardarNuevoVehiculo()">Guardar</button>
            <button class="btn-secondary" onclick="cerrarModalCrear()">Cancelar</button>
        </div>
    </div>
</div>

    <script src="../js/api.js"></script>
    <script src="../js/vehiculos.js"></script>
</body>
</html>
