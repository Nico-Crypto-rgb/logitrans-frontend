<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viajes - Logitrans</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Logitrans</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="conductores.html">Conductores</a></li>
            <li><a href="vehiculos.html">Vehículos</a></li>
            <li><a href="rutas.html">Rutas</a></li>
            <li><a href="viajes.html" class="active">Viajes</a></li>
            <li><button id="btnLogout" class="btn-secondary">Salir</button></li>
        </ul>
    </nav>

    <main class="container">
        <header class="page-header">
            <h2>Gestión y Seguimiento de Viajes</h2>
            <button class="btn-primary" id="btnNuevoViaje">Programar Viaje</button>
        </header>

        <div class="table-container">
            <table id="tablaViajes">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Conductor</th>
                        <th>Vehículo</th>
                        <th>Salida</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="listaViajes">
                    <tr><td colspan="6" class="text-center">Cargando viajes...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="modalViaje" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Programar Nuevo Viaje</h3>
            <form id="formViaje">
                <input type="hidden" id="viajeId">
                
                <div class="form-group">
                    <label>Conductor</label>
                    <select id="id_conductor" class="form-select" required>
                        <option value="">Cargando...</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Vehículo</label>
                    <select id="id_vehiculo" class="form-select" required>
                        <option value="">Cargando...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Ruta</label>
                    <select id="id_ruta" class="form-select" required>
                        <option value="">Cargando...</option>
                    </select>
                </div>

                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Fecha de Salida</label>
                        <input type="date" id="fecha_salida" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Hora de Salida</label>
                        <input type="time" id="hora_salida" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Fecha Estimada de Llegada</label>
                    <input type="date" id="fecha_llegada" required>
                </div>

                <div class="form-group">
                    <label>Observaciones</label>
                    <input type="text" id="observaciones">
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="btnCerrarModal">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar Viaje</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/viajes.js"></script>
</body>
</html>
