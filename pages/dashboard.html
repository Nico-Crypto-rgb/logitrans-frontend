<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Logitrans - Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-decoration: none; color: #333; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); background: #eef; }
    </style>
</head>
<body>

    <header>
        <h1>Panel de Control Logitrans</h1>
        <p>Selecciona un módulo:</p>
        <a href="../index.html">← Volver a la raíz</a>
    </header>

    <main class="dashboard-grid">
        <a href="viajes.html" class="card">
            <h3>Viajes</h3>
        </a>
        <a href="conductores.html" class="card">
            <h3>Conductores</h3>
        </a>
        <a href="vehiculos.html" class="card">
            <h3>Vehículos</h3>
        </a>
        <a href="rutas.html" class="card">
            <h3>Rutas</h3>
        </a>
    </main>

</body>
</html>
