<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrans Express - Login</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6;">

    <div class="login-container" style="background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px;">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">LogiTrans Express</h2>
        
        <form id="login-form">
            <div class="form-group">
    <input type="email" id="email" placeholder="Correo electrónico" required>
</div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Contraseña" required>
            </div>
            <button type="submit" style="width: 100%;">Ingresar</button>
        </form>
        
        <div id="mensaje" class="mensaje"></div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
