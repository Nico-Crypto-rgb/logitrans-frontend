<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/main.css">
    <title>Gestión de Programación</title>
</head>
<body>

<div class="dashboard-container">
    <main>
        <h1>Programación de Viajes</h1>
        <button onclick="abrirModal()">+ Nueva Programación</button>

        <div id="mensaje-feedback" class="mensaje"></div>

        <table id="tabla-programaciones">
            <thead>
                <tr>
                    <th>Ruta</th>
                    <th>Conductor</th>
                    <th>Vehículo</th>
                    <th>Fecha Salida</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="lista-programaciones">
                </tbody>
        </table>
    </main>
</div>

<div id="modal-programacion" class="modal" style="display: none;">
    <div class="modal-content">
        <h2 id="modal-titulo">Nueva Programación</h2>
        <form id="form-programacion">
            <input type="hidden" id="prog-id">
            <div class="form-group">
                <label>Ruta ID:</label>
                <input type="number" id="ruta_id" required>
            </div>
            <div class="form-group">
                <label>Conductor ID:</label>
                <input type="number" id="conductor_id" required>
            </div>
            <div class="form-group">
                <label>Vehículo ID:</label>
                <input type="number" id="vehiculo_id" required>
            </div>
            <div class="form-group">
                <label>Fecha Salida:</label>
                <input type="date" id="fecha_salida" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-danger" onclick="cerrarModal()">Cancelar</button>
                <button type="submit">Guardar</button>
            </div>
        </form>
    </div>
</div>

<script type="module" src="js/programacion.js"></script>
</body>
</html>
