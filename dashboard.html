<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LogiTrans Express - Dashboard</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        /* Agrega esto a tu main.css o aquí mismo en una etiqueta <style> */
        .welcome-card {
            background: #f8f9fa;
            padding: 2rem;
            border-radius: 8px;
            border-left: 5px solid #007bff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        .welcome-card h1 { margin-top: 0; }
        .welcome-card p { font-size: 1.1rem; color: #555; }
        .user-name { font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">LogiTrans Express</div>
        <ul>
            <a href="dashboard.html">Inicio</a>
            <a href="conductores.html">Conductores</a>
            <a href="vehiculos.html">Vehículos</a>
            <a href="rutas.html">Rutas</a>
            <a href="programacion.html">Programación</a>
            <a href="viajes.html">Viajes</a>
            <button id="btn-logout" style="background: #dc3545;">Salir</button>
        </ul>
    </nav>

    <main class="dashboard-container">
        <div class="welcome-card">
            <h1>Bienvenido al Sistema</h1>
            <p id="user-greeting">Cargando perfil...</p>
            <p>Selecciona un módulo del menú para comenzar.</p>
        </div>
    </main>

    <script type="module">
        import { verificarSesion, logout } from './js/auth.js';

        // 1. Proteger la ruta
        if (verificarSesion()) {
            const user = JSON.parse(localStorage.getItem('user'));
            // Actualizamos el texto en lugar de añadir elementos HTML desordenados
            document.getElementById('user-greeting').innerHTML = `Hola, <span class="user-name">${user.nombre}</span>`;
        }

        // 2. Configurar logout
        document.getElementById('btn-logout').addEventListener('click', logout);
    </script>
</body>
</html>
