<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Rutas</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <nav>
        <div class="logo"><strong>Gestión de Logística</strong></div>
        <div class="menu">
            <a href="dashboard.html">Inicio</a>
            <a href="conductores.html">Conductores</a>
            <a href="vehiculos.html">Vehículos</a>
            <a href="rutas.html">Rutas</a>
            <a href="viajes.html">Viajes</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <main>
            <h1>Gestión de Rutas</h1>
            
            <div style="margin-bottom: 20px;">
                <button id="btnNuevo">+ Nueva Ruta</button>
            </div>

            <table id="tablaRutas">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Origen</th>
                        <th>Destino</th>
                        <th>Distancia (km)</th>
                        <th>Tiempo Est.</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbodyRutas">
                    </tbody>
            </table>
        </main>
    </div>

    <div id="modalRuta" class="modal" style="display: none;">
        <div class="modal-content">
            <h3 id="modalTitle">Nueva Ruta</h3>
            <form id="formRuta">
                <input type="hidden" id="rutaId"> <div class="form-group">
                    <label>Origen:</label>
                    <input type="text" id="ciudadOrigen" required>
                </div>
                <div class="form-group">
                    <label>Destino:</label>
                    <input type="text" id="ciudadDestino" required>
                </div>
                <div class="form-group">
                    <label>Distancia (km):</label>
                    <input type="number" id="distancia" required>
                </div>
                <div class="form-group">
                    <label>Tiempo Estimado:</label>
                    <input type="text" id="tiempoEstimado" placeholder="Ej: 5h 30m" required>
                </div>
                <div class="form-group">
                    <label>Observaciones:</label>
                    <textarea id="observaciones"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-danger" id="btnCancelar">Cancelar</button>
                    <button type="submit">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/rutas.js"></script>
</body>
</html>
