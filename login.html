<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Logitrans Express</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; background-color: #f4f7f6; margin: 0; font-family: sans-serif;
        }
        .login-container { 
            background: white; padding: 40px; border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; 
        }
        .login-container h1 { text-align: center; margin-bottom: 20px; font-size: 24px; color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-control { 
            width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; 
            border-radius: 4px; box-sizing: border-box; 
        }
        .btn-primary { 
            width: 100%; padding: 12px; background-color: #007bff; 
            color: white; border: none; border-radius: 4px; 
            cursor: pointer; margin-top: 10px; font-size: 16px;
        }
        .btn-primary:hover { background-color: #0056b3; }
        #mensajeError { 
            margin-top: 15px; text-align: center; font-size: 0.9em; 
            color: #d9534f; min-height: 20px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Logitrans Express</h1>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Usuario o Correo:</label>
                <input type="text" id="email" class="form-control" required placeholder="tu-usuario-o-email">
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" class="form-control" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-primary">Entrar</button>
        </form>
        
        <p id="mensajeError"></p>
    </div>

    <script src="../js/api.js" defer></script>
    <script src="../js/login.js" defer></script>
</body>
</html>
